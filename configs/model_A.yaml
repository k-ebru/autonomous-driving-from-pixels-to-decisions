# Model A: best configuration from the sensitivity study.
# Six stacked frames give enough temporal information for stable
# motion estimation, and a tight clip range keeps policy updates smooth.

run_name: model_A

env:
  env_id: CarRacing-v3
  n_envs: 4
  n_stack: 6
  skip_zoom_steps: 50
  frame_size: 84

seed: 42
eval_seed: 999

ppo:
  policy: CnnPolicy
  learning_rate: 0.0003
  n_steps: 1024
  batch_size: 256
  n_epochs: 4
  ent_coef: 0.002
  clip_range: 0.20
  max_grad_norm: 0.5

training:
  total_timesteps: 10000000
  time_limit_secs: 3600
  eval_freq: 25000
  n_eval_episodes: 3

evaluation:
  stochastic_episodes: 10
  deterministic_episodes: 5
  unseen_seeds: [101, 202, 303, 404, 505, 606, 707, 808, 909, 1000]
  solved_threshold: 900
